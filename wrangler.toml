main = "@astrojs/cloudflare/entrypoints/server"
name = "jefrydco"
compatibility_date = "2026-01-11"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public", "disable_nodejs_process_v2"]

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

[[routes]]
pattern = "jefrydco.id"
custom_domain = true

[placement]
mode = "smart"
